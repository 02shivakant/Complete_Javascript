<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time</title>
    <style>
        .outer{
            border: 1px solid none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0px auto;
            height: 300px;
            width: 300px;
            margin-top: 200px;
        }
        #box{
            border: 1px solid none;
            height: 50px;
            width: 100px;
            background-color: cadetblue;
            justify-content: center;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="outer">
        <h4>Current Time</h4>
        <div id="box"></div>
    </div>
</body>
<script src="style.js"></script>
</html>
